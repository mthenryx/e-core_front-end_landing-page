<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delicia-Gelada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>



<body>

    <header>
        <div class="logo">
            <img src="./img/logo-dg.png" alt="">
        </div>

        <nav class="cabecalho">
            <a href="#">Início</a>
            <a href="#">Cardápio</a>
            <a href="#">Sobre nós</a>
            <a href="#">Contato</a>
            <a href="#">Em breve</a>
        </nav>

        <button class="btn-admin">
            Administrativo
        </button>
    </header>

    <main>
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>

        <section class="hero">
            <div class="hero-text">
                <div class="subtitulo">
                    ✦ BEBIDAS DE A-Z
                </div>

                <h1>
                    <span class="linha">Refresque seu </span>
                    <span class="linha">dia com</span>
                    <span class="linha-destaque">Delícias</span>
                    <span class="sublinha-destaque">Geladas</span>
                </h1>

                <p>As bebidas mais frescas e saborosas da cidade.</p>
                <p>De todos os fabricantes, direto pra você.</p>

                <div class="buttons">
                    <a href="#" class="btn-primary">
                        Ver Cardápio
                    </a>

                    <a href="#" class="btn-secondary">
                        Saiba mais
                    </a>
                </div>

            </div>

            <div class="hero-image">

                <div class="card card-top">
                    <span>Satisfação</span>

                    <img src="./img/grafico.png" alt="">
                </div>

                <img src="./img/lata-imagem.png" class="lata" alt="">

                <div class="card card-bottom">
                    <span>Entregas hoje</span>
                    <h3>Grátis</h3>
                </div>

                <div class="card card-right">
                    <h4>Muitos sabores</h4>
                </div>

            </div>

        </section>

    </main>

</body>

</html>
